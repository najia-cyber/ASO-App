name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check repository contents
        run: ls -la

      - name: Check if package.json exists
        run: |
          if [ -f package.json ]; then
            echo "package.json found"
            npm install
          else
            echo "No package.json yet - skipping install"
          fi
